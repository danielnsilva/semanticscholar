        "145185799", "name": "C. Lang"}, {"authorId": "52261411", "name": "L. Conrad"},
        {"authorId": "2149854", "name": "A. McMahon"}, {"authorId": "2962540", "name":
        "D. Iber"}], "abstract": "Branching patterns and regulatory networks differ
        between branched organs. It has remained unclear whether a common regulatory
        mechanism exists and how organ-specific patterns can emerge. Of all previously
        proposed signalling-based mechanisms, only a ligand-receptor-based Turing
        mechanism based on FGF10 and SHH quantitatively recapitulates the lung branching
        patterns. We now show that a GDNF-dependent ligand-receptor-based Turing mechanism
        quantitatively recapitulates branching of cultured wildtype and mutant ureteric
        buds, and achieves similar branching patterns when directing domain outgrowth
        in silico. We further predict and confirm experimentally that the kidney-specific
        positive feedback between WNT11 and GDNF permits the dense packing of ureteric
        tips. We conclude that the ligand-receptor based Turing mechanism presents
        a common regulatory mechanism for lungs and kidneys, despite the differences
        in the molecular implementation. Given its flexibility and robustness, we
        expect that the ligand-receptor-based Turing mechanism constitutes a likely
        general mechanism to guide branching morphogenesis and other symmetry breaks
        during organogenesis. Many organs develop through branching morphogenesis,
        but whether the underlying mechanisms are shared is unknown. Here, the authors
        show that a ligand-receptor based Turing mechanisms, similar to that observed
        in lung development, likely underlies branching morphogenesis of the kidney."},

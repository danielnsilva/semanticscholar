        {"bibtex": "@Article{Kondo2017AnUK,\n author = {Shigeru Kondo},\n booktitle
        = {Journal of Theoretical Biology},\n journal = {Journal of theoretical biology},\n
        pages = {\n          120-127\n        },\n title = {An updated kernel-based
        Turing model for studying the mechanisms of biological pattern formation.},\n
        volume = {414},\n year = {2017}\n}\n"}, "authors": [{"authorId": "2636335",
        "name": "Shigeru Kondo"}], "abstract": "The reaction-diffusion model presented
        by Alan Turing has recently been supported by experimental data and accepted
        by most biologists. However, scientists have recognized shortcomings when
        the model is used as the working hypothesis in biological experiments, particularly
        in studies in which the underlying molecular network is not fully understood.
        To address some such problems, this report proposes a new version of the Turing
        model. This alternative model is not represented by partial differential equations,
        but rather by the shape of an activation-inhibition kernel. Therefore, it
        is named the kernel-based Turing model (KT model). Simulation of the KT model
        with kernels of various shapes showed that it can generate all standard variations
        of the stable 2D patterns (spot, stripes and network), as well as some complex
        patterns that are difficult to generate with conventional mathematical models.
        The KT model can be used even when the detailed mechanism is poorly known,
        as the interaction kernel can often be detected by a simple experiment and
        the KT model simulation can be performed based on that experimental data.
        These properties of the KT model complement the shortcomings of conventional
        models and will contribute to the understanding of biological pattern formation."},

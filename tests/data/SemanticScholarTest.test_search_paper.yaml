        M. Alessio"}, {"authorId": "2214388751", "name": "Ankur Gupta"}], "abstract":
        "Turing patterns are fundamental in biophysics, emerging from short-range
        activation and long-range inhibition processes. However, their paradigm is
        based on diffusive transport processes that yield patterns with shallower
        gradients than those observed in nature. A complete physical description of
        this discrepancy remains unknown. We propose a solution to this phenomenon
        by investigating the role of diffusiophoresis, which is the propulsion of
        colloids by a chemical gradient, in Turing patterns. Diffusiophoresis enables
        robust patterning of colloidal particles with substantially finer length scales
        than the accompanying chemical Turing patterns. A scaling analysis and a comparison
        to recent experiments indicate that chromatophores, ubiquitous in biological
        pattern formation, are likely diffusiophoretic and the colloidal P\u00e9clet
        number controls the pattern enhancement. This discovery suggests that important
        features of biological pattern formation can be explained with a universal
        mechanism that is quantified straightforwardly from the fundamental physics
        of colloids."}, {"paperId": "883e238d17dd486435587ec4a19abaabce3c8a2c", "externalIds":

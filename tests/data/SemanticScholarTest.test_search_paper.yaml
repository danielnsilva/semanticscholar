        "name": "Sean T. Vittadello"}, {"authorId": "2080116310", "name": "T. Leyshon"},
        {"authorId": "5777074", "name": "David Schnoerr"}, {"authorId": "145518141",
        "name": "M. Stumpf"}], "abstract": "Turing patterns have morphed from mathematical
        curiosities into highly desirable targets for synthetic biology. For a long
        time, their biological significance was sometimes disputed but there is now
        ample evidence for their involvement in processes ranging from skin pigmentation
        to digit and limb formation. While their role in developmental biology is
        now firmly established, their synthetic design has so far proved challenging.
        Here, we review recent large-scale mathematical analyses that have attempted
        to narrow down potential design principles. We consider different aspects
        of robustness of these models and outline why this perspective will be helpful
        in the search for synthetic Turing-patterning systems. We conclude by considering
        robustness in the context of developmental modelling more generally. This
        article is part of the theme issue \u2018Recent progress and open frontiers
        in Turing\u2019s theory of morphogenesis\u2019."}, {"paperId": "0fc02e38e34ff9072a7234f1c8c5fa208a46ffc5",

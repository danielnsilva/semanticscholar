        Muolo"}, {"authorId": "2054759903", "name": "L. Gallo"}, {"authorId": "1795135",
        "name": "V. Latora"}, {"authorId": "1766733", "name": "M. Frasca"}, {"authorId":
        "1809355", "name": "T. Carletti"}], "abstract": "Turing theory of pattern
        formation is among the most popular theoretical means to account for the variety
        of spatio-temporal structures observed in Nature and, for this reason, finds
        applications in many different fields. While Turing patterns have been thoroughly
        investigated on continuous support and on networks, only a few attempts have
        been made towards their characterization in systems with higher-order interactions.
        In this paper, we propose a way to include group interactions in reaction-diffusion
        systems, and we study their effects on the formation of Turing patterns. To
        achieve this goal, we rewrite the problem originally studied by Turing in
        a general form that accounts for a microscropic description of interactions
        of any order in the form of a hypergraph, and we prove that the interplay
        between the different orders of interaction may either enhance or repress
        the emergence of Turing patterns. Our results shed light on the mechanisms
        of pattern-formation in systems with many-body interactions and pave the way
        for further extensions of Turing original framework."}, {"paperId": "59d9473f91d386176223fb8be06d9ba5f8fc9744",

        "@Article{Krause2019FromOP,\n author = {Andrew L. Krause and V. Klika and
        T. Woolley and E. Gaffney},\n booktitle = {Journal of the Royal Society Interface},\n
        journal = {Journal of the Royal Society Interface},\n title = {From one pattern

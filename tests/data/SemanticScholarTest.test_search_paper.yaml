        Zhong"}, {"authorId": "1491795098", "name": "Junda Shen"}, {"authorId": "2152962330",
        "name": "Jian Lu"}], "abstract": "Low-dimensional nanocrystals with controllable
        defects or strain modifications are newly emerging active electrocatalysts
        for hydrogen-energy conversion and utilization; however, a crucial challenge
        remains in insufficient stability due to spontaneous structural degradation
        and strain relaxation. Here we report a Turing structuring strategy to activate
        and stabilize superthin metal nanosheets by incorporating high-density nanotwins.
        Turing configuration, realized by constrained orientation attachment of nanograins,
        yields intrinsically stable nanotwin network and straining effects, which
        synergistically reduce the energy barrier of water dissociation and optimize
        the hydrogen adsorption free energy for hydrogen evolution reaction. Turing
        PtNiNb nanocatalyst achieves 23.5 and 3.1 times increase in mass activity
        and stability index, respectively, compared against commercial 20% Pt/C. The
        Turing PtNiNb-based anion-exchange-membrane water electrolyser with a low
        Pt mass loading of 0.05\u2009mg\u2009cm\u22122 demonstrates at least 500\u2009h
        stability at 1000\u2009mA\u2009cm\u22122, disclosing the stable catalysis.
        Besides, this new paradigm can be extended to Ir/Pd/Ag-based nanocatalysts,
        illustrating the universality of Turing-type catalysts."}, {"paperId": "9cd1dfaa3c86c71ae74b4c02ebc59cb56c4a396d",

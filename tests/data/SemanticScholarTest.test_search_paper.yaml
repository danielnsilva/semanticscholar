        "We evaluated GPT-4 in a public online Turing test. The best-performing GPT-4
        prompt passed in 49.7% of games, outperforming ELIZA (22%) and GPT-3.5 (20%),
        but falling short of the baseline set by human participants (66%). Participants\u2019
        decisions were based mainly on linguistic style (35%) and socioemotional traits
        (27%), supporting the idea that intelligence, narrowly conceived, is not sufficient
        to pass the Turing test. Participant knowledge about LLMs and number of games
        played positively correlated with accuracy in detecting AI, suggesting learning
        and practice as possible strategies to mitigate deception. Despite known limitations
        as a test of intelligence, we argue that the Turing test continues to be relevant
        as an assessment of naturalistic communication and deception. AI models with
        the ability to masquerade as humans could have widespread societal consequences,
        and we analyse the effectiveness of different strategies and criteria for
        judging humanlikeness."}, {"paperId": "10622a3158756a017a2eea14f87190c236da2915",

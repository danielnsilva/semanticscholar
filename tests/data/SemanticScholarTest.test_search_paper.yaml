        {"authorId": "2034306", "name": "C. Mirasso"}, {"authorId": "1795232", "name":
        "Ingo Fischer"}], "abstract": "Many information processing challenges are
        difficult to solve with traditional Turing or von Neumann approaches. Implementing
        unconventional computational methods is therefore essential and optics provides
        promising opportunities. Here we experimentally demonstrate optical information
        processing using a nonlinear optoelectronic oscillator subject to delayed
        feedback. We implement a neuro-inspired concept, called Reservoir Computing,
        proven to possess universal computational capabilities. We particularly exploit
        the transient response of a complex dynamical system to an input data stream.
        We employ spoken digit recognition and time series prediction tasks as benchmarks,
        achieving competitive processing figures of merit."}, {"paperId": "660b38b1f340ea0d317294289ef14afbc98acda1",

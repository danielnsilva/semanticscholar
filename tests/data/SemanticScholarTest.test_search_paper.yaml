        "abstract": "AI systems that can fool people into thinking that they are human
        could have widespread social and economic consequences. In order to measure
        this ability, we evaluated 3 systems (ELIZA, GPT-3.5 and GPT-4) in a randomized,
        controlled, and preregistered Turing test. Human participants had a 5 minute
        conversation with either a human or an AI, and judged whether or not they
        thought their interlocutor was human. GPT-4 was judged to be a human 54% of
        the time, significantly more often than ELIZA (22%) but less often than actual
        humans (67%). In order to test the generalizability of our results, we replicated
        the study on a second population (undergraduate students) and found that the
        same prompt with GPT-4o achieved a pass rate of 77%, slightly higher than
        the human pass rate of 71%. On some interpretations, the results provide the
        first robust empirical demonstration that any artificial system passes an
        interactive 2-player Turing test. The results have implications for debates
        around machine intelligence and, more urgently, suggest that deception by
        current AI systems may go undetected. Analysis of participants\u2019 strategies
        and reasoning suggests that stylistic and socio-emotional factors play a larger
        role in passing the Turing test than traditional notions of intelligence.
        We release the full transcripts of the replication data to enable further
        investigation of human-AI interaction dynamics and deception."}, {"paperId":

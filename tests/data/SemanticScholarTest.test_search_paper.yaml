        "name": "Florin-Daniel B\u00eelb\u00eee"}, {"authorId": "143936370", "name":
        "A. Paun"}, {"authorId": "7356533", "name": "L. Pan"}, {"authorId": "2614610",
        "name": "Ferrante Neri"}], "abstract": "Spiking neural P systems are a class
        of third generation neural networks belonging to the framework of membrane
        computing. Spiking neural P systems with communication on request (SNQ P systems)
        are a type of spiking neural P system where the spikes are requested from
        neighboring neurons. SNQ P systems have previously been proved to be universal
        (computationally equivalent to Turing machines) when two types of spikes are
        considered. This paper studies a simplified version of SNQ P systems, i.e.
        SNQ P systems with one type of spike. It is proved that one type of spike
        is enough to guarantee the Turing universality of SNQ P systems. Theoretical
        results are shown in the cases of the SNQ P system used in both generating
        and accepting modes. Furthermore, the influence of the number of unbounded
        neurons (the number of spikes in a neuron is not bounded) on the computation
        power of SNQ P systems with one type of spike is investigated. It is found
        that SNQ P systems functioning as number generating devices with one type
        of spike and four unbounded neurons are Turing universal."}, {"paperId": "64f47687daaa84ac1fdb1bc2f85c065007163f06",

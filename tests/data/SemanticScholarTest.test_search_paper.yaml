        "Bernardo Gon\u00e7alves"}], "abstract": "The Turing test has been studied
        and run as a controlled experiment and found to be underspecified and poorly
        designed. On the other hand, it has been defended and still attracts interest
        as a test for true artificial intelligence (AI). Scientists and philosophers
        regret the test\u2019s current status, acknowledging that the situation is
        at odds with the intellectual standards of Turing\u2019s works. This article
        refers to this as the Turing Test Dilemma, following the observation that
        the test has been under discussion for over seventy years and still is widely
        seen as either too bad or too good to be a valuable experiment for AI. An
        argument that solves the dilemma is presented, which relies on reconstructing
        the Turing test as a thought experiment in the modern scientific tradition.
        It is argued that Turing\u2019s exposition of the imitation game satisfies
        Mach\u2019s characterization of the basic method of thought experiments and
        that Turing\u2019s uses of his test satisfy Popper\u2019s conception of the
        critical and heuristic uses of thought experiments and Kuhn\u2019s association
        of thought experiments to conceptual change. It is emphasized how Turing methodically
        varied the imitation game design to address specific challenges posed to him
        by other thinkers and how his test illustrates a property of the phenomenon
        of intelligence and suggests a hypothesis on machine learning. This reconstruction
        of the Turing test provides a rapprochement to the conflicting views on its
        value in the literature."}, {"paperId": "ca8f792d1abe13bb7233a0fa939dc6d5b0d2805d",

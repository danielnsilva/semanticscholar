        = {2019}\n}\n"}, "authors": [{"authorId": "1794550", "name": "Yongli Song"},
        {"authorId": "50090195", "name": "Heping Jiang"}, {"authorId": "145377163",
        "name": "Yuan Yuan"}], "abstract": "The interactions of diffusion-driven Turing
        instability and delayinduced Hopf bifurcation always give rise to rich spatiotemporal
        dynamics. In this paper, we first derive the algorithm for the normal forms
        associated with the Turing-Hopf bifurcation in the reaction-diffusion system
        with delay, which can be used to investigate the spatiotemporal dynamical
        classification near the Turing-Hopf bifurcation point in the parameter plane.
        Then, we consider a diffusive predator-prey model with weak Allee effect and
        delay. Through investigating the dynamics of the corresponding normal form
        of Turing-Hopf bifurcation induced by diffusion and delay, the spatiotemporal
        dynamics near this bifurcation point can be divided into six categories. Especially,
        stable spatially homogeneous/inhomogeneous periodic solutions and steady states,
        coexistence of two stable spatially inhomogeneous periodic solutions, coexistence
        of two stable spaially inhomogeneous steady states and the transition from
        one kind of spatiotemporal patterns to another are found."}, {"paperId": "74e281384ed8340956989bc2a93f8387458a09bf",

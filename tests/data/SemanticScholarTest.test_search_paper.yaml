        journal = {NPJ Systems Biology and Applications},\n title = {Nobel Turing
        Challenge: creating the engine for scientific discovery},\n volume = {7},\n
        year = {2021}\n}\n"}, "authors": [{"authorId": "1742807", "name": "H. Kitano"}],
        "abstract": "Scientific discovery has long been one of the central driving
        forces in our civilization. It uncovered the principles of the world we live
        in, and enabled us to invent new technologies reshaping our society, cure
        diseases, explore unknown new frontiers, and hopefully lead us to build a
        sustainable society. Accelerating the speed of scientific discovery is therefore
        one of the most important endeavors. This requires an in-depth understanding
        of not only the subject areas but also the nature of scientific discoveries
        themselves. In other words, the \u201cscience of science\u201d needs to be
        established, and has to be implemented using artificial intelligence (AI)
        systems to be practically executable. At the same time, what may be implemented
        by \u201cAI Scientists\u201d may not resemble the scientific process conducted
        by human scientist. It may be an alternative form of science that will break
        the limitation of current scientific practice largely hampered by human cognitive
        limitation and sociological constraints. It could give rise to a human-AI
        hybrid form of science that shall bring systems biology and other sciences
        into the next stage. The Nobel Turing Challenge aims to develop a highly autonomous
        AI system that can perform top-level science, indistinguishable from the quality
        of that performed by the best human scientists, where some of the discoveries
        may be worthy of Nobel Prize level recognition and beyond."}, {"paperId":

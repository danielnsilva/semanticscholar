        "Abstract Competitive behavior, like predation, widely exists in the world
        which has influences on the dynamics of ecosystems. Though a good knowledge
        for the patten formation and selection of predator\u2013prey models with diffusion
        is known in the literature, little is known for that of a diffused competition
        model. As a result, a competition model with saturation effect and self- and
        cross-diffusion is proposed and analyzed in this paper. Firstly, by making
        use of nullcline analysis, we derive the condition of existence and stability
        of positive equilibrium and prove global stability. Then using the linear
        stability analysis, the Turing bifurcation critical value and the condition
        of the occurrence of Turing pattern are obtained when control parameter is
        selected. Finally, we deduce the amplitude equations around the Turing bifurcation
        point by using the standard multiple scale analysis. Meanwhile, a series of
        numerical simulations are given to expand our theoretical analysis. This work
        shows that cross-diffusion plays a key role in the formation of spatial patterns
        for competitive model with saturation effect."}, {"paperId": "6a5ea3c1f4256e8987db0de47cf1e787032ca400",

        {"bibtex": "@Article{Ge2023TheHO,\n author = {Z. Ge},\n booktitle = {Proceedings
        of the National Academy of Sciences of the United States of America},\n journal
        = {Proceedings of the National Academy of Sciences of the United States of
        America},\n title = {The hidden order of Turing patterns in arid and semi\u2010arid
        vegetation ecosystems},\n volume = {120},\n year = {2023}\n}\n"}, "authors":
        [{"authorId": "6279779", "name": "Z. Ge"}], "abstract": "Significance In arid
        and semi-arid climates, the self-organization of plants forms striking Turing
        patterns. However, the long-range hyperuniformity of these patterns has long
        been overlooked. The degree of hyperuniformity of the Turing pattern is positively
        correlated with water-use efficiency by vegetation. Thus, Turing patterns
        represent a spatially optimized self-organization structure for water acquisition.
        The hyperuniformity reveals the critical slowing down of spatial evolution
        when rainfall approaches the tipping point. Decreasing rainfall can lead Turing-type
        arid and semi-arid ecosystems to long-term transient regimes with low resilience.
        Disruption of hyperuniform structures causes severe damage to Turing-type
        ecosystem resilience. By understanding hyperuniformity of Turing-type ecosystems,
        we can develop effective strategies for mitigating the impacts of disturbances
        and enhancing the sustainability of arid and semi-arid ecosystems."}, {"paperId":

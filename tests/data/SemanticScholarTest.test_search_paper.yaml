        "name": "Soufiane Bentout"}, {"authorId": "2005802892", "name": "Abdelheq
        Mezouaghi"}], "abstract": "Abstract In this paper, we consider a time fractional-order
        derivative for a diffusive mussel\u2013algae model. The existence of pattern
        formation was the subject of interest of many previous research works in the
        case of the diffusive mussel\u2013algae model. Examples include the Turing
        instability, Hopf bifurcation, Turing-Hopf bifurcation, and others. The presence
        of the time\u2013fractional\u2013order derivative never been investigated
        in this model. Next to it ecological relevant, it can generate some important
        patterns. One of these patterns is produced by the presence of the Turing-Hopf
        bifurcation. Therefore, our main interest is to analyze the effect of the
        time fractional\u2013order derivative on the spatiotemporal behavior of the
        solution, which never been achieved for the mussel-algae model. Besides, Turing\u2013Hopf
        was studied exclusively on the classical reaction-diffusion systems, where
        it was also considered for the diffusive mussel-algae model. Thus, our paper
        puts the fist steps on proving the existence of this type of codimension bifurcation
        on the diffusive systems with time fractional\u2013order\u2013derivative systems.
        Further, a suitable numerical simulations are used for confirming the theoretical
        obtained results."}, {"paperId": "65f8fbcef28d6a8421cb456f32f43fe27cce40cc",

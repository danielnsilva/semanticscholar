        = {17},\n year = {2021}\n}\n"}, "authors": [{"authorId": "15769671", "name":
        "Y. Fuseya"}, {"authorId": "11037201", "name": "H. Katsuno"}, {"authorId":
        "34686254", "name": "Kamran Behnia"}, {"authorId": "4839147", "name": "A.
        Kapitulnik"}], "abstract": "Turing\u2019s reaction\u2013diffusion theory of
        morphogenesis has been very successful for understanding macroscopic patterns
        within complex objects ranging from biological systems to sand dunes. However,
        Turing patterns on microscopic length scales are extremely rare. Here we show
        that a strained atomic bismuth monolayer assembled on the surface of NbSe2\u2014and
        subject to interatomic interactions and kinetics\u2014displays Turing patterns.
        Our reaction\u2013diffusion model produces stripe patterns with a period of
        five atoms (approximately 2\u2009nm) and domain walls with Y-shaped junctions
        that bear a striking resemblance to what has been experimentally observed.
        Our work establishes that Turing patterns can occur at the atomic scale in
        a hard condensed-matter setting. Macroscale patterns seen in biological systems
        such as animal coats or skin can be described by Turing\u2019s reaction\u2013diffusion
        theory. Now Turing patterns are shown to also exist in bismuth monolayers,
        an exemplary nanoscale atomic system."}, {"paperId": "970db33809cdb96315885222ec80edb56f2fc8b7",

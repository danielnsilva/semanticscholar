        author = {Felix Brinkmann and M. Mercker and T. Richter and A. Marciniak-Czochra},\n
        booktitle = {PLoS Comput. Biol.},\n journal = {PLoS Computational Biology},\n
        title = {Post-Turing tissue pattern formation: Advent of mechanochemistry},\n
        volume = {14},\n year = {2018}\n}\n"}, "authors": [{"authorId": "40663769",
        "name": "Felix Brinkmann"}, {"authorId": "3262942", "name": "M. Mercker"},
        {"authorId": "144825773", "name": "T. Richter"}, {"authorId": "1389565398",
        "name": "A. Marciniak-Czochra"}], "abstract": "Chemical and mechanical pattern
        formation is fundamental during embryogenesis and tissue development. Yet,
        the underlying molecular and cellular mechanisms are still elusive in many
        cases. Most current theories assume that tissue development is driven by chemical
        processes: either as a sequence of chemical patterns each depending on the
        previous one, or by patterns spontaneously arising from specific chemical
        interactions (such as \u201cTuring-patterns\u201d). Within both theories,
        mechanical patterns are usually regarded as passive by-products of chemical
        pre-patters. However, several experiments question these theories, and an
        increasing number of studies shows that tissue mechanics can actively influence
        chemical patterns during development. In this study, we thus focus on the
        interplay between chemical and mechanical processes during tissue development.
        On one hand, based on recent experimental data, we develop new mechanochemical
        simulation models of evolving tissues, in which the full 3D representation
        of the tissue appears to be critical for obtaining a realistic mechanochemical
        behaviour. The presented modelling approach is flexible and numerically studied
        using state of the art finite element methods. Thus, it may serve as a basis
        to combine simulations with new experimental methods in tissue development.
        On the other hand, we apply the developed approach and demonstrate that even
        simple interactions between tissue mechanics and chemistry spontaneously lead
        to robust and complex mechanochemical patterns. Especially, we demonstrate
        that the main contradictions arising in the framework of purely chemical theories
        are naturally and automatically resolved using the mechanochemical patterning
        theory."}, {"paperId": "8ecbcec2351885579bdf9da486c19783448be270", "externalIds":

        Turing Test?},\n year = {2020}\n}\n"}, "authors": [{"authorId": "2258198921",
        "name": "Katherine Elkins"}, {"authorId": "1380792733", "name": "Jon Chun"}],
        "abstract": "Until recently the field of natural language generation relied
        upon formalized grammar systems, small-scale statistical models, and lengthy
        sets of heuristic rules. This older technology was fairly limited and brittle:
        it could remix language into word salad poems or chat with humans within narrowly
        defined topics. Recently, very large-scale statistical language models have
        dramatically advanced the field, and GPT-3 is just one example. It can internalize
        the rules of language without explicit programming or rules. Instead, much
        like a human child, GPT-3 learns language through repeated exposure, albeit
        on a much larger scale. Without explicit rules, it can sometimes fail at the
        simplest of linguistic tasks, but it can also excel at more difficult ones
        like imitating an author or waxing philosophical."}, {"paperId": "3694381e74445a8b9f8cb8d373e39626e47191b5",

        "name": "Koh Onimaru"}, {"authorId": "2650134", "name": "L. Marcon"}, {"authorId":
        "108029565", "name": "M. Musy"}, {"authorId": "47675847", "name": "Mikiko
        Tanaka"}, {"authorId": "47254653", "name": "J. Sharpe"}], "abstract": "A Turing
        mechanism implemented by BMP, SOX9 and WNT has been proposed to control mouse
        digit patterning. However, its generality and contribution to the morphological
        diversity of fins and limbs has not been explored. Here we provide evidence
        that the skeletal patterning of the catshark Scyliorhinus canicula pectoral
        fin is likely driven by a deeply conserved Bmp\u2013Sox9\u2013Wnt Turing network.
        In catshark fins, the distal nodular elements arise from a periodic spot pattern
        of Sox9 expression, in contrast to the stripe pattern in mouse digit patterning.
        However, our computer model shows that the Bmp\u2013Sox9\u2013Wnt network
        with altered spatial modulation can explain the Sox9 expression in catshark
        fins. Finally, experimental perturbation of Bmp or Wnt signalling in catshark
        embryos produces skeletal alterations which match in silico predictions. Together,
        our results suggest that the broad morphological diversity of the distal fin
        and limb elements arose from the spatial re-organization of a deeply conserved
        Turing mechanism. Mouse digit patterning is controlled by a Turing network
        of Bmp, Sox9, and Wnt. Here, Onimaru et al. show that fin patterning in the
        catshark, Scyliorhinus canicula, is controlled by the same network with a
        different spatial organization; thus, the Turing network is deeply conserved
        in limb development."}, {"paperId": "a80e6b67715d6315cc607a414fd6fe2eb9edc3b2",

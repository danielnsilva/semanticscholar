        "authors": [{"authorId": "36542362", "name": "Fengqi Yi"}], "abstract": "Abstract
        In this paper, we determine how the diffusion could destabilize an otherwise
        stable spatially homogeneous periodic solutions for the diffusive systems.
        This is known as Turing instability of the periodic solutions. In a general
        setting, we establish a formulae in terms of the diffusion rates (not necessarily
        limited to either larger diffusivity or smaller diffusivity) to determine
        Turing instability of the Hopf bifurcating periodic solutions for reaction-diffusion
        systems with cross-diffusions and the patch model of n-coupled reactors with
        cross-diffusion-like coupling. Then, we supply an example of the Lengyel-Epstein
        model which is used to characterize the CIMA chemical reactions to demonstrate
        how our results can be applied."}, {"paperId": "be1189539a93ad9fb643c6113b4cccc0be486855",

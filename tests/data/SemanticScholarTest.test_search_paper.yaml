        "143636026", "name": "K. Warwick"}, {"authorId": "2731715", "name": "Huma
        Shah"}], "abstract": "In this article we consider transcripts that originated
        from a practical series of Turing''s Imitation Game that was held on 6 and
        7 June 2014 at the Royal Society London. In all cases the tests involved a
        three-participant simultaneous comparison by an interrogator of two hidden
        entities, one being a human and the other a machine. Each of the transcripts
        considered here resulted in a human interrogator being fooled such that they
        could not make the \u2018right identification\u2019, that is, they could not
        say for certain which was the machine and which was the human. The transcripts
        presented all involve one machine only, namely \u2018Eugene Goostman\u2019,
        the result being that the machine became the first to pass the Turing test,
        as set out by Alan Turing, on unrestricted conversation. This is the first
        time that results from the Royal Society tests have been disclosed and discussed
        in a paper."}, {"paperId": "8fb5cf374acbe9fed9939ff2c0aec334b5d26187", "externalIds":

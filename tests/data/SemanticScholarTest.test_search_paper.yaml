        P\u00e9rez"}, {"authorId": "66941060", "name": "Javier Marinkovic"}, {"authorId":
        "35106192", "name": "P. Barcel\u00f3"}], "abstract": "Alternatives to recurrent
        neural networks, in particular, architectures based on attention or convolutions,
        have been gaining momentum for processing input sequences. In spite of their
        relevance, the computational properties of these alternatives have not yet
        been fully explored. We study the computational power of two of the most paradigmatic
        architectures exemplifying these mechanisms: the Transformer (Vaswani et al.,
        2017) and the Neural GPU (Kaiser & Sutskever, 2016). We show both models to
        be Turing complete exclusively based on their capacity to compute and access
        internal dense representations of the data. In particular, neither the Transformer
        nor the Neural GPU requires access to an external memory to become Turing
        complete. Our study also reveals some minimal sets of elements needed to obtain
        these completeness results."}, {"paperId": "01fe5977a3ec7d231e72cecef06501590f9f6c1b",
        "externalIds": {"PubMedCentral": "9135718", "DOI": "10.1038/s41467-022-30574-3",
